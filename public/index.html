<body>
<div id="toast"></div>
<div class="scroll-top" id="scroll-top">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
</div>

<div id="msg-viewer" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);">
  <div style="height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);">
    <div class="mono text-xs" style="color:var(--muted);">whispr — pesan anonim</div>
    <button onclick="closeViewer()" class="btn btn-ghost" style="padding:6px 10px;font-size:12px;">Tutup</button>
  </div>
  <div class="min-h-[calc(100vh-56px)] flex flex-col items-center justify-center px-4">
    <div class="flex flex-col items-center mb-6">
      <div style="width:64px;height:64px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;">?</div>
      <div class="mono text-xs mt-2" style="color:var(--muted);">anonymous</div>
    </div>
    <div id="viewer-msg" style="width:380px;max-width:90%;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px 28px;text-align:center;line-height:1.65;font-size:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08);"></div>
    <div class="mt-8 text-center">
      <a href="https://instagram.com/hamzz_jr" target="_blank" rel="noopener noreferrer" style="color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;border-bottom:1px dashed var(--border);">reveal sender</a>
    </div>
  </div>
</div>

<!-- MODAL BACKDROP & DANGER ZONE MODALS -->
<div id="modal-backdrop" onclick="closeModal()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.2);backdrop-filter:blur(4px);z-index:100;"></div>
<div id="modal-clear" class="modal-container" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:101;width:90%;max-width:400px;">
  <div style="background:var(--surface);border:1px solid #ffd4d4;border-radius:12px;padding:28px;box-shadow:0 20px 30px rgba(0,0,0,0.1);">
    <div class="text-lg font-bold mb-2">Hapus semua pesan?</div>
    <p class="text-sm mono mb-6" style="color:var(--muted);">Semua pesan masuk akan dihapus permanen. Tidak bisa dibatalkan.</p>
    <div class="flex gap-3"><button class="btn btn-ghost flex-1" onclick="closeModal()">Batal</button><button class="btn btn-danger flex-1" id="btn-clear-confirm">Ya, Hapus</button></div>
  </div>
</div>
<div id="modal-delete" class="modal-container" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:101;width:90%;max-width:400px;">
  <div style="background:var(--surface);border:1px solid #ffd4d4;border-radius:12px;padding:28px;box-shadow:0 20px 30px rgba(0,0,0,0.1);">
    <div class="text-lg font-bold mb-2">Hapus akun permanen?</div>
    <p class="text-sm mono mb-4" style="color:var(--muted);">Akun, link, dan semua pesan akan dihapus selamanya. Masukkan password untuk konfirmasi.</p>
    <input id="delete-confirm-pw" class="inp mb-4" type="password" placeholder="Password kamu" />
    <div class="flex gap-3"><button class="btn btn-ghost flex-1" onclick="closeModal()">Batal</button><button class="btn btn-danger flex-1" id="btn-delete-confirm">Hapus Akun</button></div>
  </div>
</div>

<div id="app-root"></div>

<script src="script.js"></script>
</body>
</html>
